# Web 管理后台前端 Nginx 配置
# 反向代理 /admin-api 到后端服务

server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩 - 优先使用预压缩文件，回退到实时压缩
    gzip_static on;
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 2;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/wasm image/svg+xml;
    gzip_vary on;

    # MP3 等大文件不压缩（已是压缩格式）
    gzip_disable "mp3";

    # 静态资源强缓存（文件名带 hash，可永不过期）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # API 反向代理 - 管理后台接口
    location /admin-api/ {
        proxy_pass http://server:8080/admin-api/;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

    }

    # 其他后端服务代理（Druid / Swagger / Jmreport 等）
    location /druid/ {
        proxy_pass http://server:8080/druid/;
    }
    location /doc.html {
        proxy_pass http://server:8080/doc.html;
    }
    location /webjars/ {
        proxy_pass http://server:8080/webjars/;
    }
    location /v3/ {
        proxy_pass http://server:8080/v3/;
    }
    location /admin/ {
        proxy_pass http://server:8080/admin/;
    }
    location /drag/ {
        proxy_pass http://server:8080/drag/;
    }
    location /jmreport/ {
        proxy_pass http://server:8080/jmreport/;
    }

    # WebSocket 接口
    location /infra/ws {
        proxy_pass http://server:8080/infra/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # 后端未就绪时返回友好 JSON，前端自己的拦截器可以处理
    location @backend_unavailable {
        default_type application/json;
        return 503 '{"code":503,"msg":"服务启动中，请稍候...","data":null}';
    }
    
    # Vue Router History 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
